      <text x="22" y="64" class="small">вс, 24 мая · старт 09:30</text>
      <rect x="22" y="82" width="116" height="34" rx="16" fill="#F1F1F1"/>
      <text x="80" y="104" text-anchor="middle" class="small">14.6 км</text>
      <rect x="150" y="82" width="116" height="34" rx="16" fill="#F1F1F1"/>
      <text x="208" y="104" text-anchor="middle" class="small">5:52</text>
