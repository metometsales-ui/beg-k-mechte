<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Превью приложения Бег к мечте">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0B0B0B" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F5F5"/>
    </linearGradient>
    <linearGradient id="limebar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#B7FF00"/>
      <stop offset="1" stop-color="#7EA900"/>
    </linearGradient>
    <style>
      .title{font:800 64px Inter,Arial,sans-serif;fill:#0B0B0B}
      .h2{font:800 24px Inter,Arial,sans-serif;fill:#0B0B0B}
      .label{font:800 13px Inter,Arial,sans-serif;fill:#747474;text-transform:uppercase}
      .text{font:600 16px Inter,Arial,sans-serif;fill:#747474}
      .small{font:700 12px Inter,Arial,sans-serif;fill:#747474}
      .value{font:800 34px Inter,Arial,sans-serif;fill:#0B0B0B}
      .white{fill:#FFFFFF}
      .button{font:800 15px Inter,Arial,sans-serif;fill:#0B0B0B}
    </style>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="1020" cy="82" r="210" fill="#B7FF00" opacity="0.16"/>
  <g transform="translate(24 24)">
    <rect x="0" y="0" width="240" height="852" rx="20" fill="#F5F5F5"/>
    <rect x="0" y="0" width="220" height="220" rx="20" fill="#0B0B0B" filter="url(#shadow)"/>
    <rect x="24" y="24" width="50" height="50" rx="16" fill="#B7FF00"/>
    <text x="49" y="57" text-anchor="middle" font-family="Inter,Arial" font-size="24" font-weight="800" fill="#0B0B0B">Б</text>
    <text x="24" y="160" font-family="Inter,Arial" font-size="28" font-weight="800" fill="#FFFFFF">Бег к мечте</text>
    <text x="24" y="190" font-family="Inter,Arial" font-size="15" font-weight="600" fill="#B7B7B7">Спортивный дневник</text>
    <rect x="0" y="248" width="220" height="50" rx="20" fill="#FFFFFF"/>
